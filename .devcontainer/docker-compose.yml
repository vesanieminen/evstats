services:
  app:
    image: mcr.microsoft.com/devcontainers/java:21-bookworm
    volumes:
      - ../..:/workspaces:cached
      - maven-cache:/home/vscode/.m2
      - gradle-cache:/home/vscode/.gradle
      - npm-cache:/home/vscode/.npm
      - pnpm-store:/home/vscode/.local/share/pnpm/store
      - playwright-cache:/home/vscode/.cache/ms-playwright
      - nvim-config:/home/vscode/.config/nvim
      - nvim-data:/home/vscode/.local/share/nvim
      - nvim-state:/home/vscode/.local/state/nvim
      - nvim-cache:/home/vscode/.cache/nvim
    command: sleep infinity
    network_mode: service:db

  db:
    image: postgres:16
    restart: unless-stopped
    # Ports are declared on `db` because `app` shares its network namespace
    # via `network_mode: service:db` — Docker requires `ports:` on the
    # namespace owner. Despite the service name, 8080/35729 are the app's.
    ports:
      - "8080:8080"
      - "35729:35729"
    environment:
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
  maven-cache:
  gradle-cache:
  npm-cache:
  pnpm-store:
  playwright-cache:
  nvim-config:
  nvim-data:
  nvim-state:
  nvim-cache:
