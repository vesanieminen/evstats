server.port=${PORT:8080}
logging.level.org.atmosphere = warn
spring.mustache.check-template-location = false

# Launch the default browser when starting the application in development mode
vaadin.launch-browser=false
# To improve the performance during development.
# For more information https://vaadin.com/docs/flow/spring/tutorial-spring-configuration.html#special-configuration-parameters
vaadin.whitelisted-packages = com.vaadin,org.vaadin,dev.hilla,com.vesanieminen
spring.jpa.defer-datasource-initialization = true
vaadin.frontend.hotdeploy=true
vaadin.closeIdleSessions=false

# Internationalisation. Resource bundles live in src/main/resources/messages*.properties
# and are exposed to Vaadin via EvStatsI18NProvider.
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# PostgreSQL persistence. Defaults target a local Postgres so `./mvnw` works
# out of the box on dev machines; production overrides via SPRING_DATASOURCE_URL
# (set in the Dockerfile to point at the in-cluster service).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mysecretpassword}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
